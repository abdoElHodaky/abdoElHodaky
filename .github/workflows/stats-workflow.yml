name: Update GitHub Stats Cards

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub Stats Card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=abdoElHodaky&show_icons=true&theme=tokyonight&hide_border=true&count_private=true&title_color=36BCF7&icon_color=36BCF7&text_color=c9d1d9&bg_color=0d1117" > assets/github-stats.svg

      - name: Generate Top Languages Card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=abdoElHodaky&layout=compact&theme=tokyonight&hide_border=true&title_color=36BCF7&text_color=c9d1d9&bg_color=0d1117" > assets/top-langs.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-langs.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update github stats cards [skip ci]" && git push)
