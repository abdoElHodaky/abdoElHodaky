<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="100%" style="max-width: 700px;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#FF5722"/>
    </linearGradient>
    <linearGradient id="canopyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="branchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8BC34A"/>
      <stop offset="100%" style="stop-color:#558B2F"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CDDC39"/>
      <stop offset="100%" style="stop-color:#AFB42B"/>
    </linearGradient>
    <linearGradient id="rootGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63"/>
      <stop offset="100%" style="stop-color:#5D4037"/>
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6D4C41"/>
      <stop offset="100%" style="stop-color:#3E2723"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="520" fill="url(#skyGrad)" rx="12"/>

  <!-- Stars -->
  <circle cx="50" cy="40" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="120" cy="25" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="580" cy="35" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="650" cy="55" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="80" cy="80" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="620" cy="90" r="1.5" fill="#fff" opacity="0.5"/>

  <!-- Moon -->
  <circle cx="620" cy="70" r="25" fill="#f5f5f5" opacity="0.1"/>
  <circle cx="620" cy="70" r="20" fill="#f5f5f5" opacity="0.15"/>

  <!-- Trunk -->
  <path d="M 350 480 Q 340 400 350 350 Q 360 300 350 250 Q 345 200 350 150" 
        stroke="url(#trunkGrad)" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Branches -->
  <path d="M 350 350 Q 280 320 250 280" stroke="url(#trunkGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 350 300 Q 420 270 450 230" stroke="url(#trunkGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 350 250 Q 300 220 270 190" stroke="url(#trunkGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 350 200 Q 400 180 430 160" stroke="url(#trunkGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ========== SKYWARD (Rocket) ========== -->
  <g transform="translate(350, 80)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="45" fill="#FF9800" opacity="0.15" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="35" fill="#FF5722" opacity="0.1"/>
    <!-- Rocket body -->
    <ellipse cx="0" cy="-5" rx="18" ry="28" fill="url(#rocketGrad)"/>
    <!-- Rocket window -->
    <circle cx="0" cy="-12" r="8" fill="#1a1a2e" stroke="#FFCC80" stroke-width="2"/>
    <circle cx="0" cy="-12" r="5" fill="#36BCF7" opacity="0.8"/>
    <!-- Rocket fins -->
    <polygon points="-18,10 -28,25 -18,20" fill="#E65100"/>
    <polygon points="18,10 28,25 18,20" fill="#E65100"/>
    <!-- Flame -->
    <ellipse cx="0" cy="28" rx="10" ry="18" fill="#FF5722" opacity="0.8"/>
    <ellipse cx="0" cy="32" rx="6" ry="12" fill="#FF9800" opacity="0.9"/>
    <ellipse cx="0" cy="36" rx="3" ry="8" fill="#FFEB3B" opacity="0.9"/>
    <!-- Label -->
    <text x="0" y="-42" text-anchor="middle" fill="#FF9800" font-family="Fira Code, monospace" font-size="11" font-weight="bold" filter="url(#glow)">🚀 SKYWARD</text>
    <text x="0" y="-30" text-anchor="middle" fill="#FFCC80" font-family="Fira Code, monospace" font-size="9">2026 · Blockchain · Web3</text>
  </g>

  <!-- ========== CANOPY ========== -->
  <g transform="translate(350, 160)">
    <circle cx="0" cy="0" r="55" fill="url(#canopyGrad)" opacity="0.9" filter="url(#glow)"/>
    <circle cx="-25" cy="10" r="35" fill="#43A047" opacity="0.8"/>
    <circle cx="25" cy="10" r="35" fill="#388E3C" opacity="0.8"/>
    <circle cx="0" cy="-15" r="30" fill="#66BB6A" opacity="0.7"/>
    <!-- Label -->
    <text x="0" y="-5" text-anchor="middle" fill="#fff" font-family="Fira Code, monospace" font-size="11" font-weight="bold">🌲 CANOPY</text>
    <text x="0" y="10" text-anchor="middle" fill="#C8E6C9" font-family="Fira Code, monospace" font-size="8">K8s · FluxCD · Terraform · SaaS</text>
  </g>

  <!-- ========== BRANCHES ========== -->
  <g transform="translate(250, 260)">
    <circle cx="0" cy="0" r="45" fill="url(#branchGrad)" opacity="0.9" filter="url(#glow)"/>
    <circle cx="-20" cy="8" r="28" fill="#7CB342" opacity="0.8"/>
    <circle cx="20" cy="8" r="28" fill="#689F38" opacity="0.8"/>
    <!-- Label -->
    <text x="0" y="-5" text-anchor="middle" fill="#fff" font-family="Fira Code, monospace" font-size="10" font-weight="bold">🌳 BRANCHES</text>
    <text x="0" y="8" text-anchor="middle" fill="#DCEDC8" font-family="Fira Code, monospace" font-size="7">NestJS · gRPC · Docker · CI/CD</text>
  </g>

  <g transform="translate(450, 220)">
    <circle cx="0" cy="0" r="40" fill="url(#branchGrad)" opacity="0.85"/>
    <circle cx="-15" cy="5" r="25" fill="#7CB342" opacity="0.7"/>
    <circle cx="15" cy="5" r="25" fill="#689F38" opacity="0.7"/>
    <!-- Label -->
    <text x="0" y="-3" text-anchor="middle" fill="#fff" font-family="Fira Code, monospace" font-size="9" font-weight="bold">MICROSERVICES</text>
    <text x="0" y="9" text-anchor="middle" fill="#DCEDC8" font-family="Fira Code, monospace" font-size="7">Domain-Driven Design</text>
  </g>

  <!-- ========== STEM ========== -->
  <g transform="translate(270, 370)">
    <circle cx="0" cy="0" r="40" fill="url(#stemGrad)" opacity="0.9" filter="url(#glow)"/>
    <circle cx="-15" cy="8" r="25" fill="#C0CA33" opacity="0.8"/>
    <circle cx="15" cy="8" r="25" fill="#AFB42B" opacity="0.8"/>
    <!-- Label -->
    <text x="0" y="-3" text-anchor="middle" fill="#33691E" font-family="Fira Code, monospace" font-size="10" font-weight="bold">🌿 STEM</text>
    <text x="0" y="10" text-anchor="middle" fill="#558B2F" font-family="Fira Code, monospace" font-size="7">Laravel · Express · REST · MariaDB</text>
  </g>

  <g transform="translate(430, 340)">
    <circle cx="0" cy="0" r="35" fill="url(#stemGrad)" opacity="0.85"/>
    <circle cx="-12" cy="6" r="22" fill="#C0CA33" opacity="0.7"/>
    <circle cx="12" cy="6" r="22" fill="#AFB42B" opacity="0.7"/>
    <!-- Label -->
    <text x="0" y="-2" text-anchor="middle" fill="#33691E" font-family="Fira Code, monospace" font-size="9" font-weight="bold">APIs & AUTH</text>
    <text x="0" y="9" text-anchor="middle" fill="#558B2F" font-family="Fira Code, monospace" font-size="7">JWT · OAuth · RESTful</text>
  </g>

  <!-- ========== ROOTS ========== -->
  <g transform="translate(350, 460)">
    <!-- Root spread -->
    <ellipse cx="0" cy="5" rx="80" ry="25" fill="url(#rootGrad)" opacity="0.9" filter="url(#glow)"/>
    <ellipse cx="-40" cy="0" rx="35" ry="15" fill="#6D4C41" opacity="0.8"/>
    <ellipse cx="40" cy="0" rx="35" ry="15" fill="#5D4037" opacity="0.8"/>
    <!-- Root details -->
    <path d="M -60 5 Q -80 15 -90 10" stroke="#4E342E" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M 60 5 Q 80 15 90 10" stroke="#4E342E" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M -30 15 Q -40 25 -50 22" stroke="#4E342E" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 30 15 Q 40 25 50 22" stroke="#4E342E" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Label -->
    <text x="0" y="-8" text-anchor="middle" fill="#D7CCC8" font-family="Fira Code, monospace" font-size="11" font-weight="bold">🌱 ROOTS</text>
    <text x="0" y="6" text-anchor="middle" fill="#BCAAA4" font-family="Fira Code, monospace" font-size="8">BS CompSci · Mansoura · GPA 3.77 · 🏆</text>
  </g>

  <!-- ========== CONNECTING DOTS ========== -->
  <!-- Dots on trunk -->
  <circle cx="350" cy="350" r="4" fill="#36BCF7" opacity="0.8"/>
  <circle cx="350" cy="300" r="4" fill="#36BCF7" opacity="0.8"/>
  <circle cx="350" cy="250" r="4" fill="#36BCF7" opacity="0.8"/>
  <circle cx="350" cy="200" r="4" fill="#36BCF7" opacity="0.8"/>
  <circle cx="350" cy="150" r="4" fill="#36BCF7" opacity="0.8"/>

  <!-- Pulse animation on top dot -->
  <circle cx="350" cy="80" r="6" fill="#FF9800" opacity="0.3">
    <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- ========== YEAR LABELS ========== -->
  <text x="520" y="160" fill="#8b949e" font-family="Fira Code, monospace" font-size="10" opacity="0.7">2025</text>
  <text x="180" y="260" fill="#8b949e" font-family="Fira Code, monospace" font-size="10" opacity="0.7">2023-24</text>
  <text x="180" y="370" fill="#8b949e" font-family="Fira Code, monospace" font-size="10" opacity="0.7">2020-22</text>
  <text x="520" y="460" fill="#8b949e" font-family="Fira Code, monospace" font-size="10" opacity="0.7">2019</text>

  <!-- ========== GROWTH ARROW ========== -->
  <text x="660" y="250" text-anchor="middle" fill="#36BCF7" font-family="Fira Code, monospace" font-size="12" opacity="0.6" transform="rotate(90, 660, 250)">GROWTH ↑</text>

</svg>
